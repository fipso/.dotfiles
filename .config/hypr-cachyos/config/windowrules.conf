# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hypr.land/Configuring/Window-Rules/ #

# Float Necessary Windows
windowrule {
    name = float-pavucontrol
    match:class = ^(org.pulseaudio.pavucontrol)
    float = on
}

windowrule {
    name = float-pip
    match:class = ^()$
    match:title = ^(Picture in picture)$
    float = on
}

windowrule {
    name = float-save-file
    match:class = ^()$
    match:title = ^(Save File)$
    float = on
}

windowrule {
    name = float-open-file
    match:class = ^()$
    match:title = ^(Open File)$
    float = on
}

windowrule {
    name = float-librewolf-pip
    match:class = ^(LibreWolf)$
    match:title = ^(Picture-in-Picture)$
    float = on
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = on
}

windowrule {
    name = float-xdg-portal
    match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
    float = on
}

windowrule {
    name = float-polkit
    match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
    float = on
}

windowrule {
    name = float-cachyos-hello
    match:class = ^(CachyOSHello)$
    float = on
}

windowrule {
    name = float-zenity
    match:class = ^(zenity)$
    float = on
}

windowrule {
    name = float-steam-updater
    match:class = ^()$
    match:title = ^(Steam - Self Updater)$
    float = on
}

# Increase the opacity
windowrule {
    name = opacity-filemanager
    match:class = ^(thunar|nemo)$
    opacity = 0.92
}

windowrule {
    name = opacity-discord
    match:class = ^(discord|armcord|webcord)$
    opacity = 0.96
}

windowrule {
    name = opacity-messaging
    match:title = ^(QQ|Telegram)$
    opacity = 0.95
}

windowrule {
    name = opacity-netease
    match:title = ^(NetEase Cloud Music Gtk4)$
    opacity = 0.95
}

# General window rules
windowrule {
    name = pip-window
    match:title = ^(Picture-in-Picture)$
    float = on
    size = 960 540
    move = 25%-
}

windowrule {
    name = media-float
    match:title = ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
    float = on
    size = 960 540
    move = 25%-
}

windowrule {
    name = danmu-pin
    match:title = ^(danmufloat)$
    pin = on
}

windowrule {
    name = float-rounding
    match:title = ^(danmufloat|termfloat)$
    rounding = 5
}

windowrule {
    name = terminal-animation
    match:class = ^(kitty|Alacritty)$
    animation = slide right
}

windowrule {
    name = firefox-noblur
    match:class = ^(org.mozilla.firefox)$
    no_blur = on
}

# Decorations related to floating windows on workspaces 1 to 10
windowrule {
    name = floating-decorations
    match:float = true
    match:workspace = w[fv1-10]
    border_size = 2
    border_color = $cachylblue
    rounding = 8
}

# Decorations related to tiling windows on workspaces 1 to 10
windowrule {
    name = tiling-decorations
    match:float = false
    match:workspace = f[1-10]
    border_size = 3
    rounding = 4
}
# Windows Rules End #

# Workspaces Rules https://wiki.hypr.land/Configuring/Workspace-Rules/ #
# workspace = 1, default:true, monitor:$priMon
# workspace = 6, default:true, monitor:$secMon
# Workspace selectors https://wiki.hypr.land/Configuring/Workspace-Rules/#workspace-selectors
# workspace = r[1-5], monitor:$priMon
# workspace = r[6-10], monitor:$secMon
# workspace = special:scratchpad, on-created-empty:$applauncher
# no_gaps_when_only deprecated instead workspaces rules with selectors can do the same
# Smart gaps from 0.45.0 https://wiki.hypr.land/Configuring/Workspace-Rules/#smart-gaps
workspace = w[tv1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3
# Workspaces Rules End #

# Layers Rules #
layerrule {
    name = logout-animation
    match:namespace = logout_dialog
    animation = slide top
}

# layerrule {
#     name = waybar-popin
#     match:namespace = waybar
#     animation = popin 50%
# }

layerrule {
    name = waybar-animation
    match:namespace = waybar
    animation = slide down
}

layerrule {
    name = wallpaper-animation
    match:namespace = wallpaper
    animation = fade 50%
}
# Layers Rules End #
