# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Input wiki https://wiki.hyprland.org/0.45.0/Configuring/Variables/#input

input {
    follow_mouse = 1 # 0|1|2|3
    float_switch_override_focus = 2
    kb_layout=eu,us
    #sensitivity = 1
    force_no_accel = 0
    accel_profile = adaptive
    scroll_factor = 0.3

    touchpad {
      scroll_factor = 0.5
    }
}

device {
  name = tpps/2-elan-trackpoint
  sensitivity = -0.35
}
